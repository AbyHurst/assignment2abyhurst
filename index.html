<!DOCTYPE html>
<html>
    
    <head>
    <title>Exciting shapes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"> </script>
    <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
                align-content: flex-end;
            }
            body {
                background-color: rgba(138, 107, 183, 0.881);
            }
            
    </style>
    </head>

    <body>
        <script>
            var sound1 = new buzz.sound("sound/mugtap.wav")
            var sound2 = new buzz.sound("sound/patPat.mp3")
            var sound3 = new buzz.sound("sound/PlasmaBeam.mp3")
            var sound4 = new buzz.sound("sound/magicitem.mp3")

            window.onload = function(){
                document.getElementById('Draw').addEventListener('click', function () {sound4.play();})
                document.getElementById('triOrange').addEventListener('click', function (){sound2.play();})
                document.getElementById('squWhite') .addEventListener('click', function (){sound3.play();})
            };
        </script>
        <div class="row">
            <div class="image-container"><img id="Draw" src="img/draw.png" onmouseover="this.src='img/drawclick.png';"  onmouseout="this.src='img/draw.png';" height="200" width="200"/></div>
            <div class="image-container"><img id="triOrange" src="img/tri.png" onmouseover="this.src='img/triBlue.png';" onmouseout="this.src='img/tri.png';" imga/height="200" width="200"/></div>
            <div class="image-container"><img id="squWhite" src="img/squ.png" onmousedown="this.src='img/squ.png';" onmouseup="this.src='img/squFace.png';" imga/height="200" width="200"/></div>
    
        </div>

    
        <div class="row">
            <div class="image-container"><img id="hexGrey" src="img/hex.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/rec.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/sta.png" height="200" width="200"/></div>
            </div>

        <div class="row">
            <div class="image-container"><img src="img/trr.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/sqr.png" height="200" width="200"/></div>
            <div class="image-container"><img src="img/her.png" height="200" width="200"/></div>
        </div>
    
    </body>
    
</html>
